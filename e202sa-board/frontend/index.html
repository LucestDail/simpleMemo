<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>e202sa-board</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', 'sans-serif'] },
          colors: {
            m3: {
              primary:    { DEFAULT: '#6750A4', dark: '#D0BCFF' },
              onprimary:  { DEFAULT: '#FFFFFF', dark: '#381E72' },
              secondary:  { DEFAULT: '#625B71', dark: '#CCC2DC' },
              tertiary:   { DEFAULT: '#7D5260', dark: '#EFB8C8' },
              surface:    { DEFAULT: '#FEF7FF', dark: '#1D1B20' },
              onsurface:  { DEFAULT: '#1D1B20', dark: '#E6E0E9' },
              surfvar:    { DEFAULT: '#E7E0EC', dark: '#49454F' },
              outline:    { DEFAULT: '#79747E', dark: '#938F99' },
              error:      { DEFAULT: '#B3261E', dark: '#F2B8B5' },
            },
            postit: {
              yellow: '#FFF9C4',
              pink:   '#F8BBD0',
              blue:   '#BBDEFB',
              green:  '#C8E6C9',
              orange: '#FFE0B2',
              purple: '#E1BEE7',
            },
          },
          borderRadius: { m3: '16px', 'm3-sm': '12px' },
          boxShadow: {
            m3:   '0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px 0 rgba(0,0,0,.3)',
            'm3-lg': '0 4px 8px 3px rgba(0,0,0,.15), 0 1px 3px 0 rgba(0,0,0,.3)',
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif; }
    .tab-active { border-bottom: 3px solid #6750A4; color: #6750A4; }
    .dark .tab-active { border-bottom-color: #D0BCFF; color: #D0BCFF; }
    .postit-card { transition: box-shadow 0.2s ease, transform 0.1s ease; }
    .postit-card:hover { box-shadow: 0 6px 12px 4px rgba(0,0,0,.2); }
  </style>
</head>
<body class="bg-m3-surface dark:bg-m3-surface-dark text-m3-onsurface dark:text-m3-onsurface-dark min-h-screen transition-colors duration-300">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
