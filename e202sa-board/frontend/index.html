<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6750A4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>SimpleMemo</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', 'sans-serif'] },
          colors: {
            m3: {
              primary:       { DEFAULT: '#6750A4', dark: '#D0BCFF' },
              onprimary:     { DEFAULT: '#FFFFFF', dark: '#381E72' },
              primCont:      { DEFAULT: '#EADDFF', dark: '#4F378B' },
              onPrimCont:    { DEFAULT: '#21005D', dark: '#EADDFF' },
              secondary:     { DEFAULT: '#625B71', dark: '#CCC2DC' },
              secCont:       { DEFAULT: '#E8DEF8', dark: '#4A4458' },
              tertiary:      { DEFAULT: '#7D5260', dark: '#EFB8C8' },
              surface:       { DEFAULT: '#FEF7FF', dark: '#1D1B20' },
              surfaceCont:   { DEFAULT: '#F3EDF7', dark: '#211F26' },
              onsurface:     { DEFAULT: '#1D1B20', dark: '#E6E0E9' },
              surfvar:       { DEFAULT: '#E7E0EC', dark: '#49454F' },
              onsurfvar:     { DEFAULT: '#49454F', dark: '#CAC4D0' },
              outline:       { DEFAULT: '#79747E', dark: '#938F99' },
              error:         { DEFAULT: '#B3261E', dark: '#F2B8B5' },
              errorCont:     { DEFAULT: '#F9DEDC', dark: '#8C1D18' },
            },
            postit: {
              yellow: '#FFF9C4',
              pink:   '#F8BBD0',
              blue:   '#BBDEFB',
              green:  '#C8E6C9',
              orange: '#FFE0B2',
              purple: '#E1BEE7',
            },
          },
          borderRadius: { m3: '16px', 'm3-sm': '12px', 'm3-xs': '8px' },
          boxShadow: {
            m3:       '0 1px 3px 1px rgba(0,0,0,.15), 0 1px 2px 0 rgba(0,0,0,.3)',
            'm3-lg':  '0 4px 8px 3px rgba(0,0,0,.15), 0 1px 3px 0 rgba(0,0,0,.3)',
            'postit': '0 2px 8px rgba(0,0,0,.12), 0 6px 16px rgba(0,0,0,.08)',
          },
          animation: {
            'fade-in':   'fadeIn .2s ease-out',
            'slide-up':  'slideUp .25s cubic-bezier(.2,.8,.2,1)',
            'pop':       'pop .18s ease-out',
          },
          keyframes: {
            fadeIn:  { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { transform: 'translateY(12px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
            pop:     { '0%': { transform: 'scale(.92)', opacity: 0 }, '100%': { transform: 'scale(1)', opacity: 1 } },
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    .tab-active { border-bottom: 3px solid #6750A4; color: #6750A4; font-weight: 700; }
    .dark .tab-active { border-bottom-color: #D0BCFF; color: #D0BCFF; }
    .postit-card {
      transition: box-shadow .2s ease, transform .1s ease;
      will-change: transform;
    }
    .postit-card:hover { box-shadow: 0 6px 14px 4px rgba(0,0,0,.22); }
    .postit-card .resize-handle {
      position: absolute; right: 0; bottom: 0; width: 16px; height: 16px;
      cursor: nwse-resize;
      background:
        linear-gradient(135deg, transparent 50%, rgba(0,0,0,.2) 50%, rgba(0,0,0,.2) 62%, transparent 62%, transparent 70%, rgba(0,0,0,.2) 70%, rgba(0,0,0,.2) 82%, transparent 82%);
    }
    mark { background: #FFF59D; color: inherit; padding: 0 2px; border-radius: 3px; }
    .dark mark { background: #A8925A; color: #1D1B20; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { scrollbar-width: none; }
    /* Custom range slider */
    input[type=range].m3-range {
      -webkit-appearance: none; appearance: none; height: 4px;
      background: #E7E0EC; border-radius: 999px; outline: none;
    }
    .dark input[type=range].m3-range { background: #49454F; }
    input[type=range].m3-range::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: #6750A4; cursor: pointer; border: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .dark input[type=range].m3-range::-webkit-slider-thumb { background: #D0BCFF; }
    input[type=range].m3-range::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: #6750A4; cursor: pointer; border: none;
    }
    /* iOS style toggle */
    .m3-toggle { position: relative; width: 44px; height: 24px; }
    .m3-toggle input { opacity: 0; width: 0; height: 0; }
    .m3-toggle .slider {
      position: absolute; inset: 0; background: #E7E0EC;
      border-radius: 999px; cursor: pointer; transition: background .2s;
    }
    .dark .m3-toggle .slider { background: #49454F; }
    .m3-toggle .slider::before {
      content: ""; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; background: #fff; border-radius: 50%;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .m3-toggle input:checked + .slider { background: #6750A4; }
    .dark .m3-toggle input:checked + .slider { background: #D0BCFF; }
    .m3-toggle input:checked + .slider::before { transform: translateX(20px); }
    .dark .m3-toggle input:checked + .slider::before { background: #381E72; }
    /* Safe-area helpers */
    .pt-safe { padding-top: calc(env(safe-area-inset-top, 0) + .25rem); }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 0) + .25rem); }
  </style>
</head>
<body class="bg-m3-surface dark:bg-m3-surface-dark text-m3-onsurface dark:text-m3-onsurface-dark min-h-screen transition-colors duration-300">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
